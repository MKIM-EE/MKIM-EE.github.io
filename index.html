<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minseung Kim | Ph.D. Student @ Hanyang Univ.</title>
    <meta name="google-site-verification" content="sRgjNLDHheXbSUSB7c0K1u9wpx0MR1Ol-vNgeJfeJDY" />

        content="김민승 (Minseung Kim) | 한양대학교 전자공학부 박사과정. Ph.D. Student at Hanyang University specializing in Power Electronics, High-Frequency Transformer, and Machine Learning." />
    <meta name="keywords"
        content="김민승, 한양대학교, 한양대, 전력전자, 고주파 변압기, 유한요소법, 박사과정, Minseung Kim, Hanyang University, Power Electronics, Finite Element Method, Machine Learning, Ph.D. Student" />
    <meta name="author" content="Minseung Kim" />
    <link rel="canonical" href="https://mkim-ee.github.io/" />
    <meta property="og:site_name" content="Minseung Kim" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mkim-ee.github.io/" />
    <meta property="og:title" content="Minseung Kim | Academic Portfolio" />
    <meta property="og:description" content="Personal webpage of Minseung Kim, Ph.D. student at Hanyang University." />
    <meta property="og:image" content="https://mkim-ee.github.io/assets/images/mkim.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://mkim-ee.github.io/" />
    <meta property="twitter:title" content="Minseung Kim | Academic Portfolio" />
    <meta property="twitter:description"
        content="Personal webpage of Minseung Kim, Ph.D. student at Hanyang University." />
    <meta property="twitter:image" content="https://mkim-ee.github.io/assets/images/mkim.jpg" />

    <!-- JSON-LD for WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Minseung Kim",
      "alternateName": "Minseung Kim's Academic Portfolio",
      "url": "https://mkim-ee.github.io/"
    }
    </script>

    <!-- JSON-LD for Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Minseung Kim",
      "alternateName": "김민승",
      "url": "https://mkim-ee.github.io/",
      "image": "https://mkim-ee.github.io/assets/images/mkim.jpg",
      "jobTitle": "Ph.D. Student",
      "affiliation": {
        "@type": "EducationalOrganization",
        "name": "Hanyang University"
      },
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "Mokpo National University"
      },
      "sameAs": [
        "https://scholar.google.com/citations?user=jCp59vcAAAAJ&hl=en",
        "https://ieeexplore.ieee.org/author/37067883700",
        "https://www.linkedin.com/in/mkim224/"
      ]
    }
    </script>

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <script>document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <!-- Main Content -->
    <main class="content">

        <section id="introduction" class="fade-in">
            <h1 id="profile-name"></h1>
            <div class="profile-container">
                <div class="profile-img-wrapper">
                    <img src="" alt="Minseung Kim" id="profile-img" style="cursor: pointer;" />
                </div>
                <div class="profile-text">
                    <p>
                        <strong id="profile-title"></strong><br />
                        <span id="profile-affiliation"></span>
                    </p>
                    <p id="profile-email"></p>
                    <div class="profile-links" id="profile-links"></div>
                </div>
            </div>
        </section>

        <section id="education" class="fade-in">
            <h2>Education</h2>
            <div class="timeline" id="education-timeline"></div>
        </section>

        <section id="academic" class="fade-in">
            <h2>Academic Service</h2>
            <div class="activities-list" id="academic-service-list"></div>

            <h2 style="margin-top: 3rem;">Academic Activities</h2>
            <div class="activities-list" id="academic-activities-list"></div>
        </section>

    </main>

    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
    </button>

    <script src="js/common.js"></script>
    <script>
        initPage('./');

        fetch('data/profile.json')
            .then(r => r.json())
            .then(p => {
                document.getElementById('profile-name').textContent = `${p.name} (${p.name_ko})`;
                document.getElementById('profile-img').src = p.photo;
                document.getElementById('profile-title').textContent = p.title;
                document.getElementById('profile-affiliation').textContent = p.affiliation;
                document.getElementById('profile-email').textContent = p.email;

                document.getElementById('profile-links').innerHTML = p.links.map(l =>
                    `<a href="${l.url}" class="profile-link" target="_blank">${l.label}</a>`
                ).join('');

                document.getElementById('education-timeline').innerHTML = p.education.map(e => `
                    <div class="timeline-item">
                        <div class="timeline-date">${e.period}</div>
                        <div class="timeline-title">${e.degree}</div>
                        <div class="timeline-description">${e.institution}</div>
                    </div>
                `).join('');

                document.getElementById('academic-service-list').innerHTML = p.academic_service.map(s => `
                    <div class="activity-item">
                        <strong>${s.role}</strong>
                        <span>${s.venue}</span>
                    </div>
                `).join('');

                document.getElementById('academic-activities-list').innerHTML = p.academic_activities.map((a, i) => `
                    <div class="activity-item" style="animation-delay: ${(i * 0.1).toFixed(1)}s">
                        <strong>${a.date}</strong>
                        <span>${a.description}${renderBadges(a.badges)}</span>
                    </div>
                `).join('');
            })
            .catch(() => {
                document.getElementById('profile-name').textContent = 'Failed to load profile data.';
            });
    </script>
</body>

</html>
