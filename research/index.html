<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Research | Kim, Minseung</title>
    <meta name="description"
        content="Explore Minseung Kim's research projects in Power Electronics, Machine Learning, and Grid-Forming Inverter Stability Analysis." />
    <meta name="keywords"
        content="Research, Power Electronics, Machine Learning, Grid-Forming Inverter, Hanyang University" />
    <link rel="canonical" href="https://mkim-ee.github.io/research/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mkim-ee.github.io/research/" />
    <meta property="og:title" content="Research | Kim, Minseung" />
    <meta property="og:description" content="Academic research projects of Minseung Kim." />
    <meta property="og:image" content="https://mkim-ee.github.io/assets/images/mkim.jpg" />

    <link rel="stylesheet" href="../styles.css" />
    <style>
        .research-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .research-project {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            transition: var(--transition);
        }

        .research-project:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-color: var(--primary-color);
        }

        .project-image-container {
            flex-shrink: 0;
            width: 180px;
        }

        .project-image {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            object-fit: contain;
            background: rgba(0, 0, 0, 0.02);
        }

        .project-details {
            flex-grow: 1;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 0.8rem;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .project-description {
            color: var(--text-color);
            line-height: 1.6;
            font-size: 1rem;
            opacity: 0.85;
        }

        @media screen and (max-width: 600px) {
            .research-project {
                flex-direction: column;
                gap: 1rem;
            }

            .project-image-container {
                width: 100%;
            }

            .project-image {
                height: 150px;
            }
        }
    </style>
</head>

<body>
    <script>document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <main class="content fade-in">
        <h1>Research</h1>

        <div id="project-list" class="research-list"></div>
    </main>

    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
    </button>

    <script src="../js/common.js"></script>
    <script>
        initPage('../');

        fetch('../data/research.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('project-list').innerHTML = data.projects.map((p, i) => `
                    <div class="research-project fade-in" style="animation-delay: ${(i * 0.1).toFixed(1)}s">
                        <div class="project-image-container">
                            <img src="../assets/images/${p.image}" alt="${p.image_alt}" class="project-image">
                        </div>
                        <div class="project-details">
                            <div class="project-title">${p.title}</div>
                            <div class="project-description">${p.description}</div>
                        </div>
                    </div>
                `).join('');
            });
    </script>
</body>

</html>
